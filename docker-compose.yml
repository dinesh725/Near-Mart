version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: nearmart-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  api:
    build: ./server
    container_name: nearmart-api
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/nearmart
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo-data:
