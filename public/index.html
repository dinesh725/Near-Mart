<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />

    <!-- ── PWA & Mobile Meta ──────────────────────────────────────── -->
    <meta name="theme-color" content="#070B12" />
    <meta name="description" content="NearMart — Shop, sell, deliver, and manage. Multi-role commerce platform for groceries, supply chain, and local delivery." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NearMart" />
    <meta name="application-name" content="NearMart" />
    <meta name="msapplication-TileColor" content="#070B12" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ── Icons ──────────────────────────────────────────────────── -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Razorpay Checkout ──────────────────────────────────── -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <title>NearMart</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <div id="portal-root"></div>

    <!-- ── Service Worker Registration ────────────────────────────── -->
    <script>
      (function() {
        var isCapacitor = window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform();
        var isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.hostname === '[::1]';

        if (!('serviceWorker' in navigator) || isCapacitor) return;

        // Development mode: unregister any stale SWs, don't register new ones
        if (isLocalhost) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(reg) {
              reg.unregister();
              console.log('[NearMart] Dev mode: unregistered stale SW');
            });
          });
          return;
        }

        // Production: register SW
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
              console.log('[NearMart] SW registered, scope:', reg.scope);
              // Check for updates every 60s
              setInterval(function() { reg.update(); }, 60000);
            })
            .catch(function(err) {
              console.warn('[NearMart] SW registration failed (non-critical):', err.message);
            });
        });
      })();
    </script>
  </body>
</html>
